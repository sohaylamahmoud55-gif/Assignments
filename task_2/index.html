<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!-- link to CSS -->
    <link rel="stylesheet" href="./style.css">
    <title>Document</title>
</head>

<body>
    <img src="./images.jfif" alt="doctor">
    <!-- form -->
    <form action="" method="get" class="form">
        <!-- header -->
        <h1>Doctor Appointment Form </h1>
        <hr>
        <!-- date -->
        <label for="Date">Appointment Date</label>
        <input type="date" name="Date"><br>
        <!-- time -->
        <label for="Time">Appointment Time</label>
        <input type="time" name="Time"><br>
        <!-- name -->
        <label for="Name">Name</label>
        <input type="text" name="Name" placeholder="First">
        <input type="text" name="Name" placeholder="Last"><br>
        <!-- gender -->
        <label for="Gender">Gender</label>
        <label for="Gender">Male</label>
        <input type="radio" name="Gender" value="Male">
        <label for="Gender">Female</label>
        <input type="radio" name="Gender" value="Female"><br>
        <!-- phone -->
        <label for="Phone">Phone</label>
        <input type="tel" name="Phone"><br>
        <!-- Address -->
        <label for="Address">Address</label>
        <input type="text" name="Address" placeholder="city">
        <input type="text" name="Address" placeholder="state"><br>
        <!-- Query -->
        <label for="query">Your Query</label>
        <textarea id="query" name="query" rows="3" cols="35"></textarea><br>
        <!-- Appointment type -->
        <label class="title">Appointment Type</label>
        <div class="appointment">
            <label>Select which appointment type(s) you require</label><br>
            <label><input type="checkbox" value="Cervix checkup"> Cervix checkup</label><br>
            <label><input type="checkbox" value="Heart checkup"> Heart checkup</label><br>
            <label><input type="checkbox" value="Eye check-up"> Eye check-up</label><br>
            <label><input type="checkbox" value="Hearing Test"> Hearing Test</label><br>
            <br>
            <button type="submit">Send</button>

        </div>
    </form>
</body>

</html>
